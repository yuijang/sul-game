<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drinky Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0F0F0F;
            --bg-light: #1A1A1A;
            --card-bg: #1F1F1F;
            --text-main: #FFFFFF;
            --text-sub: #BBBBBB;
            --accent-gradient: linear-gradient(180deg, #FFD700 0%, #FF8C00 100%);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark), var(--bg-light));
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Centered Mockup Container */
        .presentation-canvas {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .mockup-container {
            display: flex;
            justify-content: center;
            perspective: 1000px;
            width: 100%;
        }

        .iphone-mockup {
            width: 360px; /* Slightly larger */
            height: 740px;
            background: #000;
            border-radius: 50px;
            border: 10px solid #222;
            position: relative;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8), 0 0 20px rgba(255,140,0,0.1);
            overflow: hidden;
        }

        /* Dynamic Island */
        .dynamic-island {
            width: 110px;
            height: 30px;
            background: #000;
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 20px;
            z-index: 10;
        }

        /* Phone Screen Content - Filling the screen */
        .phone-screen {
            width: 100%;
            height: 100%;
            background: #111;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            scrollbar-width: none;
        }
        .phone-screen::-webkit-scrollbar { display: none; }

        .phone-header {
            text-align: center;
            padding: 60px 20px 20px;
            background: linear-gradient(to bottom, #111, transparent);
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .game-title {
            font-size: 34px;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 12px rgba(255, 140, 0, 0.5));
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .game-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 0 16px 40px; /* Filling the screen more effectively */
        }

        .game-card {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 16px;
            cursor: pointer;
            transition: transform 0.1s ease, background 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .game-card:active {
            transform: scale(0.96);
            background: #252525;
        }

        .card-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            margin-right: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
        }

        .card-info {
            display: flex;
            flex-direction: column;
        }

        .card-info .title { font-size: 18px; font-weight: 700; margin: 0; color: #fff; }
        .card-info .subtitle { font-size: 13px; color: var(--text-sub); margin-top: 2px; }

        /* Icons Colors */
        .icon-1 { background: linear-gradient(135deg, #FF6B6B, #EE5253); }
        .icon-2 { background: linear-gradient(135deg, #4834D4, #686DE0); }
        .icon-3 { background: linear-gradient(135deg, #6AB04C, #BAD002); }
        .icon-4 { background: linear-gradient(135deg, #F0932B, #FFBE76); }
        .icon-5 { background: linear-gradient(135deg, #1dd1a1, #10ac84); }
        .icon-6 { background: linear-gradient(135deg, #5f27cd, #341f97); }

        @media (max-width: 400px) {
            .iphone-mockup {
                width: 100vw;
                height: 100vh;
                border: none;
                border-radius: 0;
            }
            .dynamic-island { display: none; }
        }
    </style>
</head>
<body>

    <div class="presentation-canvas">
        <div class="mockup-container">
            <div class="iphone-mockup">
                <div class="dynamic-island"></div>
                <div class="phone-screen">
                    <header class="phone-header">
                        <h1 class="game-title">DRINKY GAME</h1>
                    </header>

                    <div class="game-list">
                        <div class="game-card">
                            <div class="card-icon icon-1">🦊</div>
                            <div class="card-info">
                                <p class="title">Animal Race</p>
                                <p class="subtitle">Last place drinks</p>
                            </div>
                        </div>
                        <div class="game-card">
                            <div class="card-icon icon-2">🪜</div>
                            <div class="card-info">
                                <p class="title">Ladder Pick</p>
                                <p class="subtitle">Random result</p>
                            </div>
                        </div>
                        <div class="game-card">
                            <div class="card-icon icon-3">🐊</div>
                            <div class="card-info">
                                <p class="title">Crocodile Teeth</p>
                                <p class="subtitle">Don’t get bitten</p>
                            </div>
                        </div>
                        <div class="game-card">
                            <div class="card-icon icon-4">🎈</div>
                            <div class="card-info">
                                <p class="title">Balloon Pop</p>
                                <p class="subtitle">Last to pop drinks</p>
                            </div>
                        </div>
                        <div class="game-card">
                            <div class="card-icon icon-5">🎰</div>
                            <div class="card-info">
                                <p class="title">Slot Machine</p>
                                <p class="subtitle">3 beers = drink</p>
                            </div>
                        </div>
                        <div class="game-card">
                            <div class="card-icon icon-6">🃏</div>
                            <div class="card-info">
                                <p class="title">Card Game</p>
                                <p class="subtitle">Pick the beer card</p>
                            </div>
                        </div>
                        <!-- Extra padding card for "full" look -->
                        <div style="height: 20px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
