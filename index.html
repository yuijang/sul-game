<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drinky Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0F0F0F;
            --bg-light: #1A1A1A;
            --card-bg: #1F1F1F;
            --text-main: #FFFFFF;
            --text-sub: #BBBBBB;
            --accent-gradient: linear-gradient(180deg, #FFD700 0%, #FF8C00 100%);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark), var(--bg-light));
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 60px 20px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        .game-title {
            font-size: 42px;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 140, 0, 0.4));
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .game-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .game-card {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .game-card:hover {
            transform: translateY(-5px) scale(1.02);
            background: #252525;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            border-color: rgba(255,140,0,0.2);
        }

        .game-card:active {
            transform: scale(0.98);
        }

        /* External Image Icon Style */
        .game-icon {
            width: 45px;
            height: 45px;
            object-fit: contain;
            margin-right: 20px;
            flex-shrink: 0;
        }

        /* Default Emoji/Icon Style for other items */
        .card-icon {
            width: 45px; /* Unified size with game-icon */
            height: 45px;
            border-radius: 12px;
            margin-right: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.05);
        }

        .card-info {
            display: flex;
            flex-direction: column;
        }

        .card-info .title { 
            font-size: 20px; 
            font-weight: 700; 
            margin: 0; 
            color: #fff; 
        }

        .card-info .subtitle { 
            font-size: 14px; 
            color: var(--text-sub); 
            margin-top: 4px; 
        }

        /* Animation for list items */
        .game-card {
            animation: slideUp 0.5s ease-out forwards;
            opacity: 0;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .game-card:nth-child(1) { animation-delay: 0.1s; }
        .game-card:nth-child(2) { animation-delay: 0.15s; }
        .game-card:nth-child(3) { animation-delay: 0.2s; }
        .game-card:nth-child(4) { animation-delay: 0.25s; }
        .game-card:nth-child(5) { animation-delay: 0.3s; }
        .game-card:nth-child(6) { animation-delay: 0.35s; }

    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1 class="game-title">DRINKY GAME</h1>
        </header>

        <div class="game-list">
            <div class="game-card">
                <img src="https://raw.githubusercontent.com/yuijang/sul-game/main/sul-game.ghdfls122.workers.dev/image/ani%20race.PNG" alt="Animal Race" class="game-icon">
                <div class="card-info">
                    <p class="title">Animal Race</p>
                    <p class="subtitle">Last place drinks</p>
                </div>
            </div>
            <div class="game-card">
                <div class="card-icon">🪜</div>
                <div class="card-info">
                    <p class="title">Ladder Pick</p>
                    <p class="subtitle">Random result</p>
                </div>
            </div>
            <div class="game-card">
                <div class="card-icon">🐊</div>
                <div class="card-info">
                    <p class="title">Crocodile Teeth</p>
                    <p class="subtitle">Don’t get bitten</p>
                </div>
            </div>
            <div class="game-card">
                <div class="icon balloon"></div>
                <div class="card-icon">🎈</div>
                <div class="card-info">
                    <p class="title">Balloon Pop</p>
                    <p class="subtitle">Last to pop drinks</p>
                </div>
            </div>
            <div class="game-card">
                <div class="card-icon">🎰</div>
                <div class="card-info">
                    <p class="title">Slot Machine</p>
                    <p class="subtitle">3 beers = drink</p>
                </div>
            </div>
            <div class="game-card">
                <div class="card-icon">🃏</div>
                <div class="card-info">
                    <p class="title">Card Game</p>
                    <p class="subtitle">Pick the beer card</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
