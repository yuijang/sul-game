<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drinky Game</title>

<style>
body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  background: linear-gradient(#0F0F0F, #1A1A1A);
  color: #fff;
}

.container {
  max-width: 420px;
  margin: 0 auto;
  padding: 20px;
}

/* Header */
.header {
  text-align: center;
  font-size: 28px;
  font-weight: bold;
  margin-bottom: 20px;
}

/* Game List */
.game-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* Card */
.card {
  display: flex;
  align-items: center;
  background: #1F1F1F;
  border-radius: 20px;
  padding: 16px;
  cursor: pointer;
  transition: transform 0.1s ease, background 0.2s;
}

.card:hover {
  transform: scale(1.02);
  background: #2A2A2A;
}

/* Icon */
.icon {
  width: 60px;
  height: 60px;
  background: #333;
  border-radius: 16px;
  margin-right: 16px;
}

/* Text */
.text {
  display: flex;
  flex-direction: column;
}

.title {
  font-size: 18px;
  font-weight: bold;
}

.subtitle {
  font-size: 14px;
  color: #BBBBBB;
  margin-top: 4px;
}
</style>

</head>

<body>

<div class="container">

  <div class="header">DRINKY GAME</div>

  <div class="game-list">

    <div class="card" onclick="location.href='animal-race.html'">
      <div class="icon"></div>
      <div class="text">
        <div class="title">Animal Race</div>
        <div class="subtitle">Last place drinks</div>
      </div>
    </div>

    <div class="card">
      <div class="icon"></div>
      <div class="text">
        <div class="title">Ladder Pick</div>
        <div class="subtitle">Random result</div>
      </div>
    </div>

    <div class="card">
      <div class="icon"></div>
      <div class="text">
        <div class="title">Tug of War</div>
        <div class="subtitle">Losing team drinks</div>
      </div>
    </div>

    <div class="card">
      <div class="icon"></div>
      <div class="text">
        <div class="title">Crocodile Teeth</div>
        <div class="subtitle">Don’t get bitten</div>
      </div>
    </div>

    <div class="card">
      <div class="icon"></div>
      <div class="text">
        <div class="title">Balloon Pop</div>
        <div class="subtitle">Last to pop drinks</div>
      </div>
    </div>

    <div class="card">
      <div class="icon"></div>
      <div class="text">
        <div class="title">Slot Machine</div>
        <div class="subtitle">3 beers = drink</div>
      </div>
    </div>

    <div class="card">
      <div class="icon"></div>
      <div class="text">
        <div class="title">Card Game</div>
        <div class="subtitle">Pick the beer card</div>
      </div>
    </div>

  </div>

</div>

</body>
</html>
